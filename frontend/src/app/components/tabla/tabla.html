
<div class="card">
    <p-table [value]="dispositivos" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                        <th>ID</th>
                        <th>Número de Serie</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Tamaño de Pantalla</th>
                        <th>Fecha de Compra</th>
                        <th>Estado</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-dispositivos>
                    <tr>
                        <td>{{dispositivos.idDispositivo}}</td>
                        <td>{{dispositivos.numeroSerie}}</td>
                        <td>{{dispositivos.marcaDisp}}</td>
                        <td>{{dispositivos.modeloDisp}}</td>
                        <td>{{dispositivos.tamanoPantalla}}</td>
                        <td>{{dispositivos.fechaCompra}}</td>
                        <td>{{dispositivos.estadoDisp}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
