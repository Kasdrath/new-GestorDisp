<div class="card">
  <p-table
    #dt2
    [value]="datos"
    [columns]="columnas"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [loading]="loading"
    [paginator]="true"
    [globalFilterFields]="camposFiltroDinamico"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template #caption>
      <div class="flex">
        <p-iconfield iconPosition="left" class="ml-auto">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input
            pInputText
            type="text"
            (input)="dt2.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Buscar por palabra clave"
          />
        </p-iconfield>
      </div>
    </ng-template>

    <ng-template #header let-columns>
      <tr>
        @for (col of columns; track col.field) {
          <th>{{ col.header }}</th>
        }
      </tr>
    </ng-template>
    <ng-template #body let-rowData let-columns="columns">
      <tr>
        @for (col of columns; track col.field) {
          <td>
            @if (col.type === 'date') {
              {{ rowData[col.field] | date: 'shortDate' }}
            } @else if (col.type === 'boolean') {
              <p-tag
                [value]="rowData[col.field] ? 'Activo' : 'Inactivo'"
                [severity]="getSeverity(rowData[col.field])"
              >
              </p-tag>
            } @else {
              {{ rowData[col.field] }}
            }
          </td>
        }
        <td>
          <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (onClick)="editarDatos(rowData)"/>
          <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (onClick)="eliminarDatos(rowData)"/>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="7">No se encontraron filas.</td>
      </tr>
    </ng-template>
  </p-table>
  <app-dialogo-dispositivo
    [visible]="visible"
    [dispositivo]="dataSelected"
    (visibleChange)="visibleChange($event)"
    (onSave)="guardarDispositivo($event)"
  ></app-dialogo-dispositivo>
</div>
