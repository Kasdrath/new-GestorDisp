<p-dialog
  header="Nueva Asignación"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '400px' }"
  appendTo="body"
  (onShow)="alAbrir()"
>
  <div class="flex flex-col gap-4 mt-4" [formGroup]="form">
    <!-- Selector de Empleado -->
    <div class="flex flex-col gap-2">
      <label for="empleado" class="font-semibold">Empleado</label>
      <p-select
        id="empleado"
        [options]="empleados()"
        formControlName="idEmpleado"
        optionLabel="nombreCompleto"
        dataKey="idEmpleado"
        placeholder="Selecciona un empleado"
        [filter]="true"
        filterBy="nombreCompleto"
        filterPlaceholder="Buscar empleado..."
        appendTo="body"
        styleClass="w-full"
      ></p-select>
    </div>

    <!-- Selector de Dispositivo -->
    <div class="flex flex-col gap-2">
      <label for="dispositivo" class="font-semibold">Dispositivo</label>
      <p-select
        id="dispositivo"
        [options]="dispositivosDisponibles()"
        formControlName="idDispositivo"
        optionLabel="etiquetaDropdown"
        dataKey="idDispositivo"
        placeholder="Selecciona un dispositivo"
        [filter]="true"
        filterBy="etiquetaDropdown"
        filterPlaceholder="Buscar dispositivo..."
        appendTo="body"
        styleClass="w-full"
      ></p-select>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="cerrar()" />
    <p-button label="Vincular" icon="pi pi-link" (onClick)="guardar()" [disabled]="form.invalid" />
  </ng-template>
</p-dialog>
