<p-toast />
<p-toolbar class="mb-6">
  <ng-template #start>
    <p-button
      type="button"
      pRipple
      label="Agregar"
      severity="success"
      (onClick)="abrirDialogo()"
    />

    <p-button
      type="button"
      pRipple
      label="Borrar"
      icon="pi pi-trash"
      outlined
    />
  </ng-template>
  <ng-template #end>
    <p-fileUpload
      mode="basic"
      accept="image/*"
      [maxFileSize]="1000000"
      label="Importar"
      chooseLabel="Import"
      auto
      customUpload
      class="mr-2 inline-block"
      [chooseButtonProps]="{ severity: 'secondary' }"
    />
    <p-button label="Exportar" icon="pi pi-upload" severity="secondary" />
  </ng-template>
    <app-dialogo-dispositivo
    [visible]="visible"
    [dispositivo]="dataSelected"
    (visibleChange)="visibleChange($event)"
    (onSave)="guardarDispositivo($event)"
  ></app-dialogo-dispositivo>
  <app-dialogo-empleado
    [visible]="visibleEmpleado"
    [empleado]="dataSelected"
    (visibleChange)="visibleEmpleadoChange($event)"
    (onSave)="guardarEmpleado($event)"
  ></app-dialogo-empleado>
</p-toolbar>
