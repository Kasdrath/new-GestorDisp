<div class="layout-container">
  <aside class="layout-sidebar">
    <app-panelmenu-demo (onDeviceSelect)="cargarTablaDispositivos($event)"></app-panelmenu-demo>
  </aside>
  <main class="layout-main">
    <div class="layout-content">
      <app-toolbar 
        #toolbar
        [tipoVistaActual]="tipoVistaActual()" 
        (datosActualizados)="obtenerDatos()">
      </app-toolbar>
      <app-table-demo
        [loading]="loading()"
        [datos]="datos()"
        [columnas]="columnas()"
        [camposFiltroGlobal]="camposFiltroGlobal()"
        [empleados]="empleados()"
        (datosActualizados)="obtenerDatos()"
        (onEliminar)="manejarEliminar($event)"
        (onReactivar)="manejarReactivar($event)"
        (onEdit)="toolbar.editarEntidad($event)"
      ></app-table-demo>
    </div>
  </main>
</div>
