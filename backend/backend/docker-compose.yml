version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gestor_postgres
    environment:
      POSTGRES_USER: gestor_user
      POSTGRES_PASSWORD: gestor_password
      POSTGRES_DB: gestordb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
